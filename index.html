<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hank Sales OS</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--text:#172033;--muted:#6b7280;--line:#e5e7eb;--brand:#3157d5;--danger:#b42318;--ok:#067647;--warn:#b54708}*{box-sizing:border-box}body{margin:0;font-family:Inter,"Noto Sans TC",system-ui,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}.app{max-width:1440px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.top h1{margin:0;font-size:28px}.sub{color:var(--muted);font-size:14px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:10px;cursor:pointer}.btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}.btn.danger{color:var(--danger)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat,.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 16px #1118270a}.stat{padding:18px}.stat b{font-size:28px;display:block}.stat span{font-size:13px;color:var(--muted)}.panel{padding:16px}.filters{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:10px;margin-bottom:14px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}textarea{min-height:90px;resize:vertical}.layout{display:grid;grid-template-columns:1.35fr .65fr;gap:16px}.tablewrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:900px}th,td{text-align:left;padding:12px 10px;border-bottom:1px solid var(--line);font-size:13px}th{color:var(--muted);font-weight:600}.badge{display:inline-flex;padding:4px 8px;border-radius:999px;background:#eef2ff;font-size:12px}.score{font-weight:700}.score.hi{color:var(--ok)}.score.mid{color:var(--warn)}.score.lo{color:var(--muted)}.overdue{color:var(--danger);font-weight:700}.empty{text-align:center;padding:40px;color:var(--muted)}.side h2{margin:0 0 12px;font-size:18px}.stack{display:grid;gap:12px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.hint{font-size:12px;color:var(--muted);line-height:1.5}.draft{white-space:pre-wrap;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px;min-height:120px}.modal{position:fixed;inset:0;background:#11182780;display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.dialog{background:white;border-radius:18px;padding:20px;width:min(760px,100%);max-height:90vh;overflow:auto}.dialog h2{margin-top:0}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.span2{grid-column:1/-1}@media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.layout{grid-template-columns:1fr}.filters{grid-template-columns:1fr 1fr}.formgrid{grid-template-columns:1fr}.span2{grid-column:auto}}@media(max-width:560px){.app{padding:14px}.top{align-items:flex-start;flex-direction:column}.grid,.filters{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}
</style>
</head>
<body><main class="app">
<div class="top"><div><h1>Hank Sales OS</h1><div class="sub">你的日韓陌生開發雷達、CRM 與破冰助手</div></div><div class="actions"><button class="btn" id="exportBtn">匯出備份</button><label class="btn">匯入備份<input id="importFile" type="file" accept="application/json" hidden></label><button class="btn primary" id="addBtn">＋ 新增客戶</button></div></div>
<section class="grid"><div class="stat"><b id="totalStat">0</b><span>全部名單</span></div><div class="stat"><b id="todayStat">0</b><span>今天需追蹤</span></div><div class="stat"><b id="hotStat">0</b><span>高優先客戶</span></div><div class="stat"><b id="replyStat">0%</b><span>已回覆比例</span></div></section>
<section class="panel"><div class="filters"><input id="q" placeholder="搜尋姓名、帳號、備註…"><select id="countryFilter"><option value="">所有國家</option><option>韓國</option><option>日本</option><option>台灣</option><option>香港</option><option>澳門</option><option>其他</option></select><select id="platformFilter"><option value="">所有平台</option><option>X</option><option>Threads</option><option>Instagram</option><option>YouTube</option><option>Naver</option><option>Discord</option><option>Telegram</option><option>其他</option></select><select id="stageFilter"><option value="">所有階段</option><option>待研究</option><option>待聯絡</option><option>已聯絡</option><option>已回覆</option><option>洽談中</option><option>已成交</option><option>不適合</option></select></div>
<div class="layout"><div class="tablewrap"><table><thead><tr><th>客戶</th><th>市場／平台</th><th>階段</th><th>分數</th><th>下次追蹤</th><th>動作</th></tr></thead><tbody id="tbody"></tbody></table></div>
<aside class="side"><h2>破冰助手</h2><div class="stack"><div class="field"><label>選擇名單</label><select id="draftLead"></select></div><div class="row2"><div class="field"><label>語言</label><select id="draftLang"><option value="ko">韓文</option><option value="ja">日文</option><option value="zh">繁中</option></select></div><div class="field"><label>目的</label><select id="draftGoal"><option value="chat">自然認識</option><option value="ea">EA／交易合作</option><option value="ib">IB／平台合作</option><option value="follow">再次跟進</option></select></div></div><button class="btn primary" id="generateBtn">生成破冰草稿</button><div class="draft" id="draftOutput">先新增或選擇一位客戶。</div><button class="btn" id="copyBtn">複製草稿</button><div class="hint">這一版會根據客戶最近內容與痛點組合草稿，不會自動大量發送。你仍負責最後確認，避免帳號被平台判定為垃圾訊息。</div></div></aside></div></section>
</main>
<div class="modal" id="modal"><div class="dialog"><h2 id="modalTitle">新增潛在客戶</h2><form id="leadForm" class="formgrid"><input type="hidden" id="leadId"><div class="field"><label>名稱／暱稱 *</label><input id="name" required></div><div class="field"><label>帳號</label><input id="handle" placeholder="@username"></div><div class="field"><label>國家</label><select id="country"><option>韓國</option><option>日本</option><option>台灣</option><option>香港</option><option>澳門</option><option>其他</option></select></div><div class="field"><label>平台</label><select id="platform"><option>X</option><option>Threads</option><option>Instagram</option><option>YouTube</option><option>Naver</option><option>Discord</option><option>Telegram</option><option>其他</option></select></div><div class="field"><label>階段</label><select id="stage"><option>待研究</option><option>待聯絡</option><option>已聯絡</option><option>已回覆</option><option>洽談中</option><option>已成交</option><option>不適合</option></select></div><div class="field"><label>下次追蹤</label><input id="followUp" type="date"></div><div class="field"><label>受眾／影響力 0–25</label><input id="audience" type="number" min="0" max="25" value="10"></div><div class="field"><label>活躍度 0–25</label><input id="activity" type="number" min="0" max="25" value="10"></div><div class="field"><label>合作訊號 0–25</label><input id="intent" type="number" min="0" max="25" value="10"></div><div class="field"><label>需求痛點 0–25</label><input id="pain" type="number" min="0" max="25" value="10"></div><div class="field span2"><label>最近貼文／可用破冰點</label><textarea id="recentPost" placeholder="例如：最近分享黃金EA績效，也提到目前使用的券商點差不穩定"></textarea></div><div class="field span2"><label>備註</label><textarea id="notes" placeholder="社群規模、是否已有合作、聊天偏好等"></textarea></div><div class="actions span2"><button type="button" class="btn" id="cancelBtn">取消</button><button class="btn primary" type="submit">儲存客戶</button></div></form></div></div>
<script>
const KEY='hank-sales-os-leads-v1';let leads=JSON.parse(localStorage.getItem(KEY)||'[]');const $=id=>document.getElementById(id);const today=()=>new Date().toISOString().slice(0,10);const save=()=>{localStorage.setItem(KEY,JSON.stringify(leads));render()};const score=l=>['audience','activity','intent','pain'].reduce((s,k)=>s+(Number(l[k])||0),0);const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function render(){const query=$('q').value.toLowerCase(),cf=$('countryFilter').value,pf=$('platformFilter').value,sf=$('stageFilter').value;const visible=leads.filter(l=>(!query||[l.name,l.handle,l.notes,l.recentPost].join(' ').toLowerCase().includes(query))&&(!cf||l.country===cf)&&(!pf||l.platform===pf)&&(!sf||l.stage===sf)).sort((a,b)=>score(b)-score(a));$('totalStat').textContent=leads.length;$('todayStat').textContent=leads.filter(l=>l.followUp&&l.followUp<=today()&&!['已成交','不適合'].includes(l.stage)).length;$('hotStat').textContent=leads.filter(l=>score(l)>=70).length;const replied=leads.filter(l=>['已回覆','洽談中','已成交'].includes(l.stage)).length;$('replyStat').textContent=(leads.length?Math.round(replied/leads.length*100):0)+'%';$('tbody').innerHTML=visible.length?visible.map(l=>{const sc=score(l),cl=sc>=70?'hi':sc>=45?'mid':'lo',fu=l.followUp?`<span class="${l.followUp<today()?'overdue':''}">${l.followUp}</span>`:'—';return `<tr><td><strong>${esc(l.name)}</strong><br><span class="sub">${esc(l.handle)}</span></td><td>${esc(l.country)}／${esc(l.platform)}</td><td><span class="badge">${esc(l.stage)}</span></td><td><span class="score ${cl}">${sc}</span></td><td>${fu}</td><td><button class="btn" onclick="editLead('${l.id}')">編輯</button> <button class="btn danger" onclick="removeLead('${l.id}')">刪除</button></td></tr>`}).join(''):`<tr><td colspan="6" class="empty">尚未有符合條件的名單</td></tr>`;$('draftLead').innerHTML=leads.length?leads.sort((a,b)=>score(b)-score(a)).map(l=>`<option value="${l.id}">${esc(l.name)}（${score(l)}分）</option>`).join(''):'<option value="">尚無名單</option>'}
function openModal(l){$('modal').classList.add('open');$('modalTitle').textContent=l?'編輯潛在客戶':'新增潛在客戶';const data=l||{country:'韓國',platform:'X',stage:'待研究',audience:10,activity:10,intent:10,pain:10};['leadId','name','handle','country','platform','stage','followUp','audience','activity','intent','pain','recentPost','notes'].forEach(k=>{const id=k==='leadId'?'leadId':k;$(id).value=k==='leadId'?(data.id||''):(data[k]??'')})}
window.editLead=id=>openModal(leads.find(l=>l.id===id));window.removeLead=id=>{if(confirm('確定刪除這位客戶？')){leads=leads.filter(l=>l.id!==id);save()}};$('addBtn').onclick=()=>openModal();$('cancelBtn').onclick=()=> $('modal').classList.remove('open');$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('open')};$('leadForm').onsubmit=e=>{e.preventDefault();const id=$('leadId').value||crypto.randomUUID();const item={id,name:$('name').value.trim(),handle:$('handle').value.trim(),country:$('country').value,platform:$('platform').value,stage:$('stage').value,followUp:$('followUp').value,audience:+$('audience').value,activity:+$('activity').value,intent:+$('intent').value,pain:+$('pain').value,recentPost:$('recentPost').value.trim(),notes:$('notes').value.trim(),updatedAt:new Date().toISOString()};const i=leads.findIndex(l=>l.id===id);i>=0?leads[i]=item:leads.push(item);$('modal').classList.remove('open');save()};['q','countryFilter','platformFilter','stageFilter'].forEach(id=>$(id).addEventListener('input',render));
function draft(l,lang,goal){const point=l.recentPost||l.notes||'最近的內容';const goalText={chat:'想自然認識並了解近況',ea:'想了解EA或交易合作的可能性',ib:'想了解平台或IB合作的可能性',follow:'針對先前訊息自然跟進'}[goal];if(lang==='ko')return `안녕하세요 ${l.name}님. ${point} 관련 내용을 보고 연락드렸어요. 단순히 홍보 메시지를 보내려는 건 아니고, 실제로 어떤 방식으로 운영하고 계신지 궁금했습니다. ${goalText==='想自然認識並了解近況'?'요즘은 주로 어떤 쪽에 집중하고 계세요?':'혹시 관련해서 편하게 이야기 나눠봐도 괜찮을까요?'}`;if(lang==='ja')return `${l.name}さん、はじめまして。${point}についての投稿を拝見して、少し気になってご連絡しました。いきなり営業のお話をしたいわけではなく、実際にどのような形で取り組まれているのか興味があります。よろしければ、少しお話を伺っても大丈夫でしょうか。`;return `${l.name}你好，我看到你最近分享「${point}」，所以想來認識一下。不是一上來就要推銷，只是覺得你做的內容跟我目前接觸的方向蠻接近，也想了解你現在主要在經營哪一塊。方便聊聊嗎？`}
$('generateBtn').onclick=()=>{const l=leads.find(x=>x.id===$('draftLead').value);$('draftOutput').textContent=l?draft(l,$('draftLang').value,$('draftGoal').value):'請先新增客戶。'};$('copyBtn').onclick=async()=>{await navigator.clipboard.writeText($('draftOutput').textContent);$('copyBtn').textContent='已複製';setTimeout(()=>$('copyBtn').textContent='複製草稿',1200)};$('exportBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(leads,null,2)],{type:'application/json'}));a.download=`hank-sales-os-${today()}.json`;a.click()};$('importFile').onchange=async e=>{try{const data=JSON.parse(await e.target.files[0].text());if(!Array.isArray(data))throw Error();if(confirm(`匯入 ${data.length} 筆資料並覆蓋目前名單？`)){leads=data;save()}}catch{alert('備份檔格式不正確')}};render();
</script></body></html>
